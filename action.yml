---
name: "Setup Mint"
author: Yevhen Fabizhevskyi
description: "This action sets up a Mint programming language."
branding:
  icon: feather
  color: green
inputs:
  version:
    description: Mint version. Defaults to the latest version.
    required: false
    default: "latest"
  force:
    description: |
      If "false" skips installation if mint is already installed. If "true"
      installs mint in any case. Defaults to "false".
    required: false
    default: "false"
  github-token:
    description: |
      GitHub token that is used to send requests to GitHub API such as getting
      latest release. Defaults to the token provided by GitHub Actions environment.
    required: false
    default: ${{ github.token }}
outputs:
  installed:
    description: Whether mint was installed or not.
    value: "${{ steps.install-mint.outcome == 'success' }}"
runs:
  using: "composite"
  steps:
    - name: Fail
      if: (runner.os == 'Windows'
        || (runner.os == 'Linux' && startsWith(runner.arch, 'ARM')))
      run: |
        echo "::error title=OS is not supported::${RUNNER_OS} ${RUNNER_ARCH} is not supported"
        exit 1
      shell: sh

    - name: Collect info
      id: info
      env:
        INPUT_FORCE: "${{ inputs.force }}"
      run: ./collect-info.sh "${INPUT_FORCE}"
      shell: sh
      working-directory: "${{ github.action_path }}/src"

    - name: Download binary
      if: ${{ steps.info.outputs.bin-installed == 'false' }}
      id: download-binary
      uses: robinraju/release-downloader@v1
      with:
        repository: "mint-lang/mint"
        latest: "${{ inputs.version == 'latest' }}"
        tag: "${{ inputs.version == 'latest' && '' || inputs.version }}"
        fileName: "mint-*-${{ runner.os == 'Linux' && 'linux' || 'osx' }}-${{ startsWith(runner.arch, 'ARM') && 'arm64' || 'x86_64' }}"
        out-file-path: "${{ steps.info.outputs.bin-dir }}"
        token: "${{ inputs.github-token }}"

    - name: Ensure OpenSSL 1.1 (macOS)
      if: runner.os == 'macOS'
      run: |
        OPENSSL3=/opt/homebrew/opt/openssl@3
        OPENSSL1_LIB=/opt/homebrew/opt/openssl@1.1/lib
        if [ ! -f "$OPENSSL1_LIB/libssl.1.1.dylib" ]; then
          mkdir -p "$OPENSSL1_LIB"
          printf '%s\n' \
            '#include <openssl/evp.h>' \
            'int EVP_MD_size(const EVP_MD *md) { return EVP_MD_get_size(md); }' \
            'int EVP_MD_block_size(const EVP_MD *md) { return EVP_MD_get_block_size(md); }' \
            'int EVP_CIPHER_key_length(const EVP_CIPHER *c) { return EVP_CIPHER_get_key_length(c); }' \
            'int EVP_CIPHER_iv_length(const EVP_CIPHER *c) { return EVP_CIPHER_get_iv_length(c); }' \
            'int EVP_CIPHER_block_size(const EVP_CIPHER *c) { return EVP_CIPHER_get_block_size(c); }' \
            'int EVP_CIPHER_CTX_key_length(const EVP_CIPHER_CTX *c) { return EVP_CIPHER_CTX_get_key_length(c); }' \
            'int EVP_CIPHER_CTX_iv_length(const EVP_CIPHER_CTX *c) { return EVP_CIPHER_CTX_get_iv_length(c); }' \
            'int EVP_CIPHER_CTX_block_size(const EVP_CIPHER_CTX *c) { return EVP_CIPHER_CTX_get_block_size(c); }' \
            > /tmp/openssl_shim.c
          cc -dynamiclib \
            -install_name "$OPENSSL1_LIB/libcrypto.1.1.dylib" \
            -I "$OPENSSL3/include" -L "$OPENSSL3/lib" \
            -Wl,-reexport_library,"$OPENSSL3/lib/libcrypto.3.dylib" \
            /tmp/openssl_shim.c \
            -o "$OPENSSL1_LIB/libcrypto.1.1.dylib"
          cc -dynamiclib \
            -install_name "$OPENSSL1_LIB/libssl.1.1.dylib" \
            -L "$OPENSSL3/lib" \
            -Wl,-reexport_library,"$OPENSSL3/lib/libssl.3.dylib" \
            -o "$OPENSSL1_LIB/libssl.1.1.dylib"
        fi
      shell: sh

    - name: Install mint
      if: ${{ steps.info.outputs.bin-installed == 'false' }}
      id: install-mint
      run: |
        tag_name="${{ steps.download-binary.outputs.tag_name }}"
        mv "mint-${tag_name}-${{ case(runner.os == 'Linux', 'linux', 'osx') }}-${{ case(startsWith(runner.arch, 'ARM'), 'arm64', 'x86_64') }}" mint
        chmod +x mint
        echo "$(pwd)" >> "$GITHUB_PATH"
      shell: sh
      working-directory: ${{ steps.info.outputs.bin-path }}

    - name: Print version
      run: mint version
      shell: sh
